<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenTrace — 你的数字生活编年史</title>

    <!-- Meta Tags -->
    <meta name="description" content="ScreenTrace - 智能屏幕活动追踪与时间管理工具，帮助你理解时间流向，优化生活节奏">
    <meta name="theme-color" content="#1a1f3a">

    <!-- Fonts & Plotly -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/main.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
</head>
<body>
    <!-- ========== Header ========== -->
    <header class="header" role="banner">
        <div class="header-inner">
            <div class="brand">
                <h1 class="brand-name">ScreenTrace</h1>
                <span class="brand-tagline">数字生活编年史</span>
            </div>

            <nav class="header-nav">
                <button class="btn btn-secondary" id="themeToggle" aria-label="切换主题">
                    <span class="theme-icon">☀️</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- ========== Hero Section ========== -->
    <section class="hero">
        <div class="hero-content">
            <h2 class="hero-title">理解你的时间</h2>
            <p class="hero-subtitle">
                用数据讲述你的数字生活故事
            </p>

            <!-- Controls Bar -->
            <div class="controls-bar">
                <div class="control-group">
                    <label class="control-label" for="timeRange">时间范围</label>
                    <select id="timeRange" class="btn btn-secondary">
                        <option value="1">今天</option>
                        <option value="7" selected>最近7天</option>
                        <option value="14">最近14天</option>
                        <option value="30">最近30天</option>
                    </select>
                </div>

                <div class="control-group">
                    <button class="btn btn-primary" id="refreshBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M14 8C14 11.3137 11.3137 14 8 14C4.68629 14 2 11.3137 2 8C2 4.68629 4.68629 2 8 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M14 2V6H10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        刷新数据
                    </button>
                </div>

                <div class="control-group" style="margin-left: auto;">
                    <input type="checkbox" id="autoRefresh" checked style="cursor: pointer;">
                    <label for="autoRefresh" class="control-label" style="cursor: pointer;">自动刷新</label>
                    <select id="refreshInterval" class="btn btn-secondary">
                        <option value="5">5秒</option>
                        <option value="10" selected>10秒</option>
                        <option value="30">30秒</option>
                        <option value="60">60秒</option>
                    </select>
                </div>
            </div>

            <p class="last-update" id="lastUpdate" style="font-size: var(--text-sm); color: var(--color-text-tertiary); margin-top: var(--spacing-md);">
                最后更新: —
            </p>
        </div>
    </section>

    <!-- ========== Stats Section ========== -->
    <section class="stats-section">
        <div class="container">
            <div class="stats-grid">
                <article class="stat-card">
                    <div class="stat-label">总活动次数</div>
                    <div class="stat-value text-mono" id="totalCount">—</div>
                    <div class="stat-change positive" id="totalCountChange">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 3L8 13M8 3L4 7M8 3L12 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>+12%</span>
                    </div>
                </article>

                <article class="stat-card">
                    <div class="stat-label">主要活动</div>
                    <div class="stat-value text-display" id="mainCategory" style="font-size: var(--text-4xl);">—</div>
                    <div style="font-size: var(--text-sm); color: var(--color-text-tertiary);">生活维度</div>
                </article>

                <article class="stat-card">
                    <div class="stat-label">常用应用</div>
                    <div class="stat-value text-mono" id="topApp" style="font-size: var(--text-3xl);">—</div>
                    <div style="font-size: var(--text-sm); color: var(--color-text-tertiary);">使用最多</div>
                </article>

                <article class="stat-card">
                    <div class="stat-label">深度工作</div>
                    <div class="stat-value text-mono" id="deepWork">—</div>
                    <div style="font-size: var(--text-sm); color: var(--color-text-tertiary);">专注会话</div>
                </article>
            </div>
        </div>
    </section>

    <!-- ========== Charts Section ========== -->
    <section class="charts-section">
        <div class="container">
            <header class="section-header">
                <h3 class="section-title">数据洞察</h3>
            </header>

            <div class="charts-grid">
                <!-- Chart 1: Category Pie -->
                <article class="chart-card">
                    <div class="chart-header">
                        <h4 class="chart-title">生活维度分布</h4>
                    </div>
                    <div class="chart-container" id="categoryPieChart">
                        <div class="skeleton" style="width: 100%; height: 400px;"></div>
                    </div>
                </article>

                <!-- Chart 2: Daily Bar -->
                <article class="chart-card">
                    <div class="chart-header">
                        <h4 class="chart-title">每日活动统计</h4>
                    </div>
                    <div class="chart-container" id="dailyBarChart">
                        <div class="skeleton" style="width: 100%; height: 400px;"></div>
                    </div>
                </article>

                <!-- Chart 3: Heatmap -->
                <article class="chart-card">
                    <div class="chart-header">
                        <h4 class="chart-title">活动时段热力图</h4>
                    </div>
                    <div class="chart-container" id="heatmapChart">
                        <div class="skeleton" style="width: 100%; height: 400px;"></div>
                    </div>
                </article>

                <!-- Chart 4: Trend -->
                <article class="chart-card">
                    <div class="chart-header">
                        <h4 class="chart-title">活动趋势</h4>
                    </div>
                    <div class="chart-container" id="trendChart">
                        <div class="skeleton" style="width: 100%; height: 400px;"></div>
                    </div>
                </article>

                <!-- Chart 5: App Usage (Full Width) -->
                <article class="chart-card full-width">
                    <div class="chart-header">
                        <h4 class="chart-title">应用使用统计</h4>
                    </div>
                    <div class="chart-container" id="appUsageChart">
                        <div class="skeleton" style="width: 100%; height: 400px;"></div>
                    </div>
                </article>
            </div>
        </div>
    </section>

    <!-- ========== Recent Activity Section ========== -->
    <section class="stats-section">
        <div class="container">
            <header class="section-header">
                <h3 class="section-title">最近活动</h3>
            </header>

            <div class="activity-list" id="recentActivityList" style="display: grid; gap: var(--spacing-md);">
                <!-- Activity items will be loaded here -->
                <div class="skeleton" style="width: 100%; height: 60px;"></div>
                <div class="skeleton" style="width: 100%; height: 60px;"></div>
                <div class="skeleton" style="width: 100%; height: 60px;"></div>
            </div>
        </div>
    </section>

    <!-- ========== Footer ========== -->
    <footer class="footer">
        <div class="container">
            <p>ScreenTrace v1.0 — 用数据讲述你的数字生活故事</p>
        </div>
    </footer>

    <!-- ========== Scripts ========== -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
