<!-- ========== 新版本v2.0 - 苹果风格UI ========== -->
<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenTrace - 智能时间管理</title>

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

    <!-- 模块化CSS -->
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <h1>📊 ScreenTrace</h1>
            <p>智能屏幕活动追踪与分析</p>
        </div>

        <!-- 主题切换按钮 -->
        <div class="theme-toggle">
            <button id="themeToggle" aria-label="切换主题">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="container">
        <!-- 控制栏 -->
        <div class="controls">
            <div class="controls-left">
                <label for="timeRange">时间范围：</label>
                <select id="timeRange">
                    <option value="1" selected>今天</option>
                    <option value="7">最近7天</option>
                    <option value="14">最近14天</option>
                    <option value="30">最近30天</option>
                </select>
                <button class="btn-primary" onclick="app.loadAllData()">
                    🔄 手动刷新
                </button>
            </div>

            <div class="controls-right">
                <div class="auto-refresh-toggle">
                    <input type="checkbox" id="autoRefresh" checked>
                    <label for="autoRefresh">自动刷新</label>
                </div>
                <select id="refreshInterval">
                    <option value="5">5秒</option>
                    <option value="10" selected>10秒</option>
                    <option value="30">30秒</option>
                    <option value="60">60秒</option>
                </select>
                <span class="last-update" id="lastUpdate">最后更新: --</span>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-cards">
            <div class="stat-card" data-id="totalCount">
                <h3>总活动次数</h3>
                <div class="value" id="totalCount">-</div>
                <div class="label">截图记录</div>
            </div>
            <div class="stat-card" data-id="mainCategory">
                <h3>主要活动</h3>
                <div class="value" id="mainCategory">-</div>
                <div class="label">生活维度</div>
            </div>
            <div class="stat-card" data-id="topApp">
                <h3>常用应用</h3>
                <div class="value" id="topApp">-</div>
                <div class="label">使用最多</div>
            </div>
            <div class="stat-card" data-id="deepWork">
                <h3>深度工作</h3>
                <div class="value" id="deepWork">-</div>
                <div class="label">会话次数</div>
            </div>
        </div>

        <!-- 最近活动 -->
        <div class="recent-activity">
            <h2>🆕 最近活动</h2>
            <div class="activity-list" id="recentActivityList">
                <div class="no-data">加载中...</div>
            </div>
        </div>

        <!-- 图表网格 -->
        <div class="charts-grid">
            <div class="chart-container">
                <h2>生活维度分布</h2>
                <div id="categoryPieChart">
                    <div class="skeleton skeleton-chart"></div>
                </div>
            </div>

            <div class="chart-container">
                <h2>每日活动统计</h2>
                <div id="dailyBarChart">
                    <div class="skeleton skeleton-chart"></div>
                </div>
            </div>

            <div class="chart-container">
                <h2>活动时段热力图</h2>
                <div id="heatmapChart">
                    <div class="skeleton skeleton-chart"></div>
                </div>
            </div>

            <div class="chart-container">
                <h2>活动趋势</h2>
                <div id="trendChart">
                    <div class="skeleton skeleton-chart"></div>
                </div>
            </div>
        </div>

        <!-- 应用使用统计 -->
        <div class="chart-container">
            <h2>应用使用统计</h2>
            <div id="appUsageChart">
                <div class="skeleton skeleton-chart"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>ScreenTrace v1.0 | 智能时间管理工具</p>
    </footer>

    <!-- 模块化JavaScript (ES6 Module) -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
